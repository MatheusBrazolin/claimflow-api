<div>
  <h2>Lista de Sinistros</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Número</th>
        <th>Descrição</th>
        <th>Status</th>
        <th>Valor</th>
        <th>Data Abertura</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of sinistros">
        <td>{{ s.id }}</td>
        <td>{{ s.numero }}</td>
        <td>{{ s.descricao }}</td>
        <td>{{ s.status }}</td>
        <td>{{ s.valor_solicitado | currency:'BRL' }}</td>
        <td>{{ s.data_abertura | date:'short' }}</td>
      </tr>
    </tbody>
  </table>
</div>
